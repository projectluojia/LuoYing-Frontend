<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arknights Web UI</title>
    <style>
        /* ==========================================================================
           基础重置与全局设定
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            perspective: 1200px;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, 'Microsoft YaHei', sans-serif;
            background-color: #f7f9ff;
        }

        /* 全局默认鼠标：暗蓝色全填充 + 细白边（防止在深色背景下看不清） */
        html,
        body {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><polygon points="4,4 10,26 14,18 24,18" fill="%230a7ba6" stroke="white" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, auto !important;
        }

        /* 悬停状态：涵盖链接/按钮/输入等交互元素 */
        a,
        button,
        input,
        select,
        textarea,
        .btn-nav,
        .currency-item,
        .terminal-module,
        [role="button"],
        label {
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><polygon points="4,4 10,26 14,18 24,18" fill="%230a7ba6" stroke="white" stroke-width="1.5" stroke-linejoin="round"/></svg>') 4 4, pointer !important;
        }

        /* ==========================================================================
           背景与 3D 舞台环境
           ========================================================================== */

        /* 静态渐变背景层 */
        .static-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #ffeef7 0%, #e7f2ff 100%);
            z-index: -1;
        }

        /* 3D 场景视口容器，取消鼠标事件以防拦截内部交互 */
        .scene {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            pointer-events: none;
        }

        /* 动态跟随鼠标旋转的 UI 主图层 */
        .ui-layer {
            position: relative;
            width: 100%;
            max-width: 1600px;
            aspect-ratio: 16 / 9;
            transform-style: preserve-3d;
            transform: rotateX(0deg) rotateY(0deg);
            transition: transform 0.15s ease-out;
            pointer-events: none;
        }

        /* ==========================================================================
           左侧面板模块
           ========================================================================== */

        /* 左侧布局容器 */
        .left-panel {
            position: absolute;
            top: 35%;
            left: 4%;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transform-style: preserve-3d;
            transform-origin: left center;
            transform: translateZ(20px) rotateY(15deg);
            pointer-events: none;
        }

        /* 玩家名片组件 */
        .player-card {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.92) 0%, rgba(232, 243, 255, 0.88) 100%);
            padding: 20px;
            position: relative;
            border-left: 4px solid #ff9ec4;
            color: #35507a;
            box-shadow: -10px 10px 20px rgba(120, 150, 200, 0.32);
            pointer-events: auto;
        }

        .level-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .level-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid rgba(138, 182, 255, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .level-circle .lv-num {
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1;
        }

        .level-circle .lv-text {
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        .player-info .name {
            font-size: 1.6rem;
            font-weight: bold;
        }

        .player-info .id {
            font-size: 0.8rem;
            color: #6f7f9d;
            font-family: monospace;
        }

        /* 秘书助理台词展示区 */
        .secretary-voice {
            background: rgba(255, 255, 255, 0.78);
            padding: 15px;
            font-size: 0.9rem;
            line-height: 1.6;
            border-left: 2px solid #8ab6ff;
            color: #4a5f86;
            pointer-events: auto;
        }

        /* ==========================================================================
           右侧面板模块
           ========================================================================== */

        /* 右侧布局容器 */
        .right-panel {
            position: absolute;
            top: 20%;
            right: 4%;
            width: 55%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transform-style: preserve-3d;
            transform-origin: right center;
            transform: translate3d(0, 0, 20px) rotateY(-15deg);
            pointer-events: none;
        }

        /* 资产信息栏容器 */
        .currencies {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            margin-bottom: 20px;
            transform-style: preserve-3d;
            pointer-events: none;
        }

        /* 资产信息展示项 */
        .currency-item {
            background: transparent;
            border: none;
            padding: 5px 15px;
            font-family: monospace;
            font-size: 1.1rem;
            color: #2d5fa8;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: -4px 4px 10px rgba(120, 150, 200, 0.28);
            cursor: pointer;
            pointer-events: auto;
            transform: translate3d(0px, 0px, 0px);
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.25s ease, box-shadow 0.25s ease;
        }

        /* 资产图标尺寸与排版控制 */
        .currency-icon {
            height: 22px;
            width: auto;
            object-fit: contain;
            pointer-events: none;
        }

        .currency-item span {
            color: #6f7f9d;
            font-size: 0.9rem;
        }

        .currency-item:hover {
            background-color: rgba(170, 215, 255, 0.78);
            transform: translate3d(-4px, -4px, 20px);
            box-shadow: -8px 8px 15px rgba(95, 155, 235, 0.42);
        }

        /* 终端核心模块容器 */
        .terminal-module {
            background: linear-gradient(to right, rgba(240, 249, 255, 0.96), rgba(210, 235, 255, 0.93));
            border-left: 5px solid #4aa9ff;
            height: 140px;
            color: #2d5fa8;
            display: flex;
            align-items: center;
            padding: 0 40px;
            margin-bottom: 5px;
            cursor: pointer;
            position: relative;
            box-shadow: -5px 5px 20px rgba(120, 150, 200, 0.3);
            pointer-events: auto;
            transform: translate3d(0px, 0px, 10px);
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .terminal-module:hover {
            background-color: rgba(180, 220, 255, 0.96);
            transform: translate3d(-8px, -8px, 40px);
            box-shadow: -12px 12px 30px rgba(95, 155, 235, 0.45);
        }

        /* 终端模块内部 UI 元素 */
        .sanity-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid rgba(74, 169, 255, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 30px;
        }

        .sanity-ring .num {
            font-size: 2.5rem;
            font-family: 'Arial';
        }

        .terminal-text .en {
            font-size: 3.5rem;
            font-weight: 300;
            font-family: 'Times New Roman', serif;
            letter-spacing: 2px;
            line-height: 1;
        }

        .terminal-text .zh {
            font-size: 1.2rem;
            font-weight: bold;
            color: #5b87bf;
            letter-spacing: 5px;
            margin-top: 5px;
        }

        /* 导航菜单网格布局 */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            transform-style: preserve-3d;
            pointer-events: none;
        }

        .nav-grid.two-cols {
            grid-template-columns: 1fr 1fr;
        }

        /* 通用导航按钮组件 */
        .btn-nav {
            background: rgba(255, 255, 255, 0.88);
            height: 85px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 25px;
            cursor: pointer;
            position: relative;
            box-shadow: -4px 4px 15px rgba(120, 150, 200, 0.28);
            pointer-events: auto;
            transform: translate3d(0px, 0px, 0px);
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), background-color 0.25s ease, box-shadow 0.25s ease;
        }

        .btn-nav::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(74, 169, 255, 0.45);
            transition: 0.2s;
        }

        .btn-nav:hover {
            background-color: rgba(186, 223, 255, 0.95);
            transform: translate3d(-6px, -6px, 25px);
            box-shadow: -10px 10px 25px rgba(95, 155, 235, 0.44);
        }

        .btn-nav:hover::after {
            background: #4aa9ff;
            height: 3px;
        }

        /* 特定红色主题导航按钮 */
        .btn-nav.theme-red {
            background: rgba(126, 191, 255, 0.9);
        }

        .btn-nav.theme-red:hover {
            background-color: rgba(74, 169, 255, 1);
        }

        .btn-nav .en {
            font-size: 1.4rem;
            font-family: 'Times New Roman', serif;
            font-style: italic;
            color: #2f5fa5;
        }

        .btn-nav.theme-red .en {
            color: #fff;
        }

        .btn-nav .zh {
            font-size: 0.9rem;
            font-weight: bold;
            color: #5c7fb3;
            margin-top: 4px;
        }

        .btn-nav.theme-red .zh {
            color: rgba(255, 255, 255, 0.92);
        }
    </style>
</head>

<body>

    <div class="static-bg"></div>

    <div class="scene">
        <div class="ui-layer" id="uiLayer">

            <div class="left-panel">
                <div class="player-card">
                    <div class="level-container">
                        <div class="level-circle"><span class="lv-num">106</span><span class="lv-text">LV</span></div>
                        <div class="player-info">
                            <div class="name">三角初华</div>
                            <div class="id">ID: 857594593</div>
                        </div>
                    </div>
                </div>
                <div class="secretary-voice">贵安，博士。今晚我们会举办一场化装舞会，为您预留了贵宾席位。如果您方便的话，欢迎前来参加。</div>
            </div>

            <div class="right-panel">

                <div class="currencies">
                    <div class="currency-item">
                        <img src="图标_龙门币.png" class="currency-icon" alt="龙门币">
                        2843414
                    </div>
                    <div class="currency-item">
                        <img src="图标_合成玉.png" class="currency-icon" alt="合成玉">
                        80746
                    </div>
                    <div class="currency-item">
                        <img src="图标_源石.png" class="currency-icon" alt="源石">
                        264
                    </div>
                </div>

                <div class="terminal-module">
                    <div class="sanity-ring"><span class="num">177</span></div>
                    <div class="terminal-text">
                        <div class="en">Terminal</div>
                        <div class="zh">终 端</div>
                    </div>
                </div>

                <div class="nav-grid two-cols">
                    <div class="btn-nav"><span class="en">Squads</span><span class="zh">编队</span></div>
                    <div class="btn-nav"><span class="en">Operator</span><span class="zh">干员 / 角色管理</span></div>
                </div>

                <div class="nav-grid">
                    <div class="btn-nav theme-red"><span class="en">Store</span><span class="zh">采购中心</span></div>
                    <div class="btn-nav theme-red"><span class="en">Recruit</span><span class="zh">公开招募</span></div>
                    <div class="btn-nav theme-red"><span class="en">Headhunt</span><span class="zh">干员寻访</span></div>
                </div>

                <div class="nav-grid">
                    <div class="btn-nav"><span class="en">Mission</span><span class="zh">任务</span></div>
                    <div class="btn-nav"><span class="en">Base</span><span class="zh">基建</span></div>
                    <div class="btn-nav"><span class="en">Depot</span><span class="zh">仓库</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uiLayer = document.getElementById('uiLayer');

        // 监听鼠标移动，实现全局视差与 3D 偏转效果
        document.addEventListener('mousemove', (e) => {
            const w = window.innerWidth;
            const h = window.innerHeight;

            const offsetX = (e.clientX / w - 0.5) * 2;
            const offsetY = (e.clientY / h - 0.5) * 2;

            const maxRotateY = 4;
            const maxRotateX = 2;

            const rotateX = -(offsetY * maxRotateX);
            const rotateY = (offsetX * maxRotateY);

            uiLayer.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // 鼠标移出屏幕时重置视图角度
        document.addEventListener('mouseleave', () => {
            uiLayer.style.transform = `rotateX(0deg) rotateY(0deg)`;
        });
    </script>
    <script>
        (function () {
            // 1. 动态创建全屏透明 Canvas
            const canvas = document.createElement('canvas');
            canvas.id = 'baSparkCanvas';
            Object.assign(canvas.style, {
                position: 'fixed',
                left: '0',
                top: '0',
                width: '100%',
                height: '100%',
                pointerEvents: 'none', // 保证鼠标点击能穿透到网页原本的元素上
                zIndex: '2147483647',  // 保持在最顶层
                background: 'transparent'
            });
            // 确保 body 存在后再添加
            if (document.body) {
                document.body.appendChild(canvas);
            } else {
                document.addEventListener('DOMContentLoaded', () => document.body.appendChild(canvas));
            }

            // 2. 核心粒子特效类（完全还原 BASpark 仓库的视觉参数和对象池优化）
            class MouseSpark {
                constructor(canvasEl, opts = {}) {
                    this.c = canvasEl;
                    this.ctx = this.c.getContext("2d");

                    // 核心参数设置
                    this.color = opts.color || '45,175,255'; // 默认碧蓝档案青色
                    this.scale = opts.scale || 1.5;
                    this.opacity = opts.opacity || 1.0;
                    this.speed = opts.speed || 1.0;
                    this.maxTrail = opts.maxTrail || 16;

                    // 对象池（复用对象，提升网页性能）
                    this.sparkPool = [];
                    this.wavePool = [];

                    // 活跃元素数组
                    this.waves = [];
                    this.sparks = [];
                    this.trail = [];
                    this.isDown = false;
                    this.lastPos = null;
                    this.baseFrameMs = 1000 / 60;
                    this.maxDeltaMs = 100;
                    this.lastFrameTime = performance.now();

                    this.resize();
                    window.addEventListener("resize", () => this.resize());
                    this.bindEvents();
                    requestAnimationFrame((now) => this.loop(now));
                }

                alpha(value) {
                    return Math.max(0, Math.min(1, value * this.opacity));
                }

                resize() {
                    let dpr = window.devicePixelRatio || 1;
                    this.c.width = window.innerWidth * dpr;
                    this.c.height = window.innerHeight * dpr;
                    this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                }

                bindEvents() {
                    const getPos = (e) => ({ x: e.clientX, y: e.clientY });
                    const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

                    window.addEventListener("mousedown", e => {
                        this.isDown = true;
                        this.lastPos = getPos(e);
                        this.boom(this.lastPos.x, this.lastPos.y); // 触发点击爆炸特效
                    });

                    window.addEventListener("mousemove", e => {
                        // 鼠标移动时直接产生尾迹（不再要求按下拖拽）

                        const p = getPos(e);
                        if (!this.lastPos) this.lastPos = p;

                        if (this.lastPos && dist(p, this.lastPos) > 2) {
                            this.trail.push({ x: p.x, y: p.y, life: 1 });
                            this.lastPos = p;
                            if (this.trail.length > this.maxTrail) this.trail.shift();

                            // 拖拽时随机溅射小火花
                            if (Math.random() < 0.3) {
                                let a = Math.random() * Math.PI * 2;
                                let speedAdjust = this.scale / 1.5;
                                this.sparks.push({
                                    x: p.x + Math.cos(a) * 10 * this.scale,
                                    y: p.y + Math.sin(a) * 10 * this.scale,
                                    vx: Math.cos(a) * 1.3 * speedAdjust,
                                    vy: Math.sin(a) * 1.3 * speedAdjust,
                                    rot: Math.random() * Math.PI * 2,
                                    rs: 0.16,
                                    s: 9 * this.scale,
                                    a: 0.7,
                                    f: 0.95
                                });
                            }
                        }
                    });

                    window.addEventListener("mouseup", () => this.isDown = false);
                }

                boom(x, y) {
                    // 1. 生成中心扩散波纹和旋转断裂圆环
                    let wave;
                    if (this.wavePool.length > 0) {
                        wave = this.wavePool.pop();
                        wave.x = x; wave.y = y; wave.life = 0; wave.max = 18; wave.r = 0;
                        wave.ring.ang = Math.random() * Math.PI * 2; wave.ring.life = 0;
                    } else {
                        wave = {
                            x, y, life: 0, max: 18, r: 0,
                            ring: {
                                ang: Math.random() * Math.PI * 2,
                                segs: [
                                    { off: -0.25 * Math.PI, len: 1.15 * Math.PI },
                                    { off: 0.00 * Math.PI, len: 1.15 * Math.PI },
                                    { off: 0.25 * Math.PI, len: 1.15 * Math.PI }
                                ],
                                life: 0, maxLife: 30, rs: 0.08
                            }
                        };
                    }
                    this.waves.push(wave);

                    // 2. 生成向四周溅射的三角形火花
                    let particleCount = 4;
                    let speedAdjust = this.scale / 1.5;
                    for (let i = 0; i < particleCount; i++) {
                        let a = Math.random() * Math.PI * 2;
                        let speed = (4.8 + Math.random() * 2) * speedAdjust;

                        let spark;
                        if (this.sparkPool.length > 0) {
                            spark = this.sparkPool.pop();
                            spark.x = x; spark.y = y;
                            spark.vx = Math.cos(a) * speed; spark.vy = Math.sin(a) * speed;
                            spark.rot = Math.random() * Math.PI * 2;
                            spark.rs = (Math.random() - 0.5) * 0.28;
                            spark.s = (4 + Math.random() * 3) * this.scale;
                            spark.a = 1; spark.f = 0.9;
                        } else {
                            spark = {
                                x, y,
                                vx: Math.cos(a) * speed, vy: Math.sin(a) * speed,
                                rot: Math.random() * Math.PI * 2,
                                rs: (Math.random() - 0.5) * 0.28,
                                s: (4 + Math.random() * 3) * this.scale,
                                a: 1, f: 0.9
                            };
                        }
                        this.sparks.push(spark);
                    }
                }

                loop(now) {
                    const deltaMs = Math.min(now - this.lastFrameTime, this.maxDeltaMs);
                    this.lastFrameTime = now;
                    const frameScale = (deltaMs / this.baseFrameMs) * this.speed;

                    if (this.waves.length > 0 || this.sparks.length > 0 || this.trail.length > 0) {
                        this.ctx.clearRect(0, 0, this.c.width, this.c.height);
                        this.ctx.globalCompositeOperation = "lighter";

                        // 渲染尾迹
                        for (let i = this.trail.length - 1; i >= 0; i--) {
                            let t = this.trail[i];
                            t.life -= 0.12 * frameScale;
                            if (t.life <= 0) this.trail.splice(i, 1);
                        }

                        if (this.trail.length > 1) {
                            this.ctx.lineWidth = 5.0;
                            this.ctx.shadowColor = `rgba(${this.color}, 0.6)`;
                            this.ctx.shadowBlur = 3;

                            const lastIdx = this.trail.length - 1;
                            for (let i = 0; i < lastIdx; i++) {
                                const alphaStart = i / lastIdx;
                                const alphaEnd = (i + 1) / lastIdx;
                                const a0 = this.trail[i];
                                const a1 = this.trail[i + 1];

                                const segGrad = this.ctx.createLinearGradient(a0.x, a0.y, a1.x, a1.y);
                                segGrad.addColorStop(0, `rgba(${this.color}, ${alphaStart})`);
                                segGrad.addColorStop(1, `rgba(${this.color}, ${alphaEnd})`);

                                this.ctx.beginPath();
                                this.ctx.moveTo(a0.x, a0.y);
                                this.ctx.lineTo(a1.x, a1.y);
                                this.ctx.strokeStyle = segGrad;
                                this.ctx.stroke();
                            }
                            this.ctx.shadowColor = 'transparent';
                        }

                        // 渲染波纹和圆环
                        for (let i = this.waves.length - 1; i >= 0; i--) {
                            let w = this.waves[i];
                            w.life += frameScale;
                            let progress = w.life / w.max;
                            let ease = 1 - Math.pow(1 - Math.min(progress, 1), 3);
                            w.r = 26 * this.scale * ease;
                            let alpha = Math.max(0, 1 - progress);

                            // 内部实心波纹
                            if (alpha > 0) {
                                this.ctx.beginPath();
                                this.ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
                                this.ctx.fillStyle = `rgba(${this.color},${this.alpha(alpha)})`;
                                this.ctx.fill();
                            }

                            // 外部断裂旋转圆环
                            let r = w.ring;
                            r.life += frameScale;
                            let rProg = Math.min(r.life / r.maxLife, 1);
                            r.ang -= r.rs * frameScale;
                            r.segs.forEach(seg => {
                                let shrink = Math.max(0, 1 - rProg);
                                let len = seg.len * shrink;
                                let start = r.ang + seg.off;
                                this.ctx.beginPath();
                                this.ctx.arc(w.x, w.y, w.r + 3 * this.scale, start, start + len);
                                this.ctx.lineWidth = 3.7;
                                this.ctx.strokeStyle = `rgba(245,248,252,${this.alpha(1 - rProg)})`;
                                this.ctx.stroke();
                            });

                            if (progress >= 1 && rProg >= 1) {
                                this.wavePool.push(this.waves[i]);
                                this.waves.splice(i, 1);
                            }
                        }

                        // 渲染溅射的三角形火花
                        for (let i = this.sparks.length - 1; i >= 0; i--) {
                            let s = this.sparks[i];
                            s.x += s.vx * frameScale;
                            s.y += s.vy * frameScale;
                            s.vx *= Math.pow(s.f, frameScale);
                            s.vy *= Math.pow(s.f, frameScale);
                            s.rot += s.rs * frameScale;
                            s.a -= 0.032 * frameScale;
                            if (s.a <= 0) {
                                this.sparkPool.push(this.sparks[i]);
                                this.sparks.splice(i, 1);
                                continue;
                            }

                            this.ctx.save();
                            this.ctx.translate(s.x, s.y);
                            this.ctx.rotate(s.rot);
                            this.ctx.beginPath();
                            this.ctx.moveTo(0, -s.s);
                            this.ctx.lineTo(s.s * 0.6, s.s * 0.6);
                            this.ctx.lineTo(-s.s * 0.6, s.s * 0.6);
                            this.ctx.fillStyle = `rgba(255,255,255,${this.alpha(s.a)})`;
                            this.ctx.fill();
                            this.ctx.restore();
                        }
                        this.ctx.globalCompositeOperation = "source-over";
                    }
                    requestAnimationFrame((nextNow) => this.loop(nextNow));
                }
            }

            // 3. 实例化并启动特效
            // 可以在这里修改 RGB 颜色值，当前为亮蓝色粒子效果
            window.baSparkEffect = new MouseSpark(canvas, {
                color: '74,169,255',
                scale: 1.5,
                opacity: 1.0,
                speed: 1.0
            });
        })();
    </script>
